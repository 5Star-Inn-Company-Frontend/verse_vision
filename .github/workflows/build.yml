name: Build / Release

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r python/requirements.txt

      - name: Install dependencies
        run: npm ci

      - name: Build React App & API
        run: npm run app:build

      - name: Build Electron App
        uses: samuelmeuli/action-electron-builder@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}

      # Alternative: Upload to GitHub Release (Nightly) to bypass Artifact storage limits
      # This puts the files in the "Releases" section instead of "Actions Artifacts"
      - name: Update Nightly Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly
          name: Nightly Build
          files: |
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.snap
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Only try to upload artifacts for PRs, with 1 day retention to save space
      - name: Upload Build Artifacts (PR Only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: VerseVision-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.snap
          retention-days: 1
          if-no-files-found: warn
