name: versevision_camera
description: Mobile camera app for VerseVision
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.3
  http: ^1.2.2
  mobile_scanner: ^7.1.3
  flutter_webrtc: ^1.2.1
  shared_preferences: ^2.5.1
  battery_plus: ^6.2.1
  wakelock_plus: ^1.2.10
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
flutter:
  uses-material-design: true
  assets:
    - assets/
